<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 320"
     width="650" height="320" style="background:#fff;max-width:100%">
  <defs>
    <style>
      text { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }
      .box        { fill: #dbeafe; stroke: #3b82f6; stroke-width: 2; rx: 4; }
      .text-math  { font-size: 20px; font-style: italic; fill: #1e293b;
                    text-anchor: middle; }
      .text-label { font-size: 13.5px; font-weight: 600; fill: #334155;
                    text-anchor: middle; }
      .text-loop  { font-size: 13.5px; font-weight: 600; fill: #475569;
                    text-anchor: middle; font-style: italic; }
      .arrow-line { stroke: #64748b; stroke-width: 2.5; fill: none;
                    marker-end: url(#ah); }
    </style>
    <marker id="ah" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Boxes (background layer) -->
  <rect x="40" y="100" width="100" height="80" class="box"/>
  <rect x="210" y="100" width="120" height="80" class="box"/>
  <rect x="400" y="100" width="120" height="80" class="box"/>

  <!-- Box labels -->
  <text x="90" y="135" class="text-math">&#969;(t)</text>
  <text x="90" y="165" class="text-math">&#968;(t)</text>
  <text x="270" y="148" class="text-math">&#969;(t+&#916;t)</text>
  <text x="460" y="148" class="text-math">&#968;(t+&#916;t)</text>

  <!-- Arrow 1: Vorticity transport -->
  <path d="M 140 140 L 202 140" class="arrow-line"/>
  <text x="170" y="78" class="text-label">Vorticity transport</text>
  <text x="170" y="96" class="text-label" style="font-weight:400; font-style:italic; font-size:12px">(Eq. 1)</text>

  <!-- Arrow 2: Poisson equation -->
  <path d="M 330 140 L 392 140" class="arrow-line"/>
  <text x="360" y="78" class="text-label">Poisson equation</text>
  <text x="360" y="96" class="text-label" style="font-weight:400; font-style:italic; font-size:12px">(Eq. 3)</text>

  <!-- Return arrow: Next timestep -->
  <path d="M 460 180 L 460 260 L 90 260 L 90 188" class="arrow-line"/>
  <text x="275" y="288" class="text-loop">Next timestep</text>
</svg>

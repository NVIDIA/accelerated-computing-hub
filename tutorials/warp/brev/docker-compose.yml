name: &tutorial-name warp

x-config:
  dockerfile: &dockerfile tutorials/warp/brev/dockerfile
  image: &image ghcr.io/nvidia/warp-tutorial:latest
  working-dir: &working-dir /accelerated-computing-hub/tutorials/warp/notebooks
  default-jupyter-url: &default-jupyter-url ["/lab/tree/accelerated-computing-hub/tutorials/warp/notebooks/01__intro_to_warp.ipynb?file-browser-path=/accelerated-computing-hub/tutorials/warp/notebooks"]
  gpu-config: &gpu-config
    privileged: true
    ulimits:
      memlock: -1
      stack: 67108864
    shm_size: 1g
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
  common-env: &common-env
    ACH_TUTORIAL: *tutorial-name
    ACH_RUN_TESTS: ${ACH_RUN_TESTS:-}
    ACH_TEST_ARGS: ${ACH_TEST_ARGS:-}
    ACH_USER: ${ACH_USER:-ach}
    ACH_UID: ${ACH_UID:-1000}
    ACH_GID: ${ACH_GID:-1000}
  common-service: &common-service
    pull_policy: missing
    volumes:
      - accelerated-computing-hub:/accelerated-computing-hub
      - /var/run/docker.sock:/var/run/docker.sock
    environment: *common-env
    user: root
    working_dir: *working-dir
  persistent-service: &persistent-service
    depends_on:
      base:
        condition: service_completed_successfully
    restart: unless-stopped

services:
  base:
    <<: [*gpu-config, *common-service]
    image: *image
    entrypoint: ["/accelerated-computing-hub/brev/entrypoint.bash", "base"]
    build:
      context: ../../..
      dockerfile: *dockerfile
    restart: "no"
  jupyter:
    <<: [*gpu-config, *common-service, *persistent-service]
    image: *image
    entrypoint: ["/accelerated-computing-hub/brev/entrypoint.bash", "jupyter"]
    command: *default-jupyter-url
    ports:
      - "127.0.0.1:8888:8888" # JupyterLab

volumes:
  accelerated-computing-hub:

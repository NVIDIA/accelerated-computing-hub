name: Build and Push Brev Tutorial Docker Images

on:
  push:
    branches:
      - main
      - "event/**"
      - "pull-request/[0-9]+"
  schedule:
    # Nightly build at midnight EST (5 AM UTC).
    - cron: "0 5 * * *"
  workflow_dispatch:
    inputs:
      purge_cache:
        description: "Purge Docker build cache and rebuild from scratch"
        required: false
        type: boolean
        default: false
      tutorials_filter:
        description: "Space/comma-separated tutorial names to build (empty = all). Default scopes the fork to pyhpc."
        required: false
        type: string
        default: "pyhpc"
  # pull_request is not supported for this workflow due to self-hosted runners
  # see the "Reviewing PRs from forks" section in CONTRIBUTING.md for more details

# Fork scoping: this fork only maintains the pyhpc tutorial image, so by
# default the build matrix is filtered to pyhpc. Override with the
# tutorials_filter input (set it empty to build every tutorial).
env:
  ACH_TUTORIALS_FILTER: ${{ github.event.inputs.tutorials_filter || 'pyhpc' }}

# Prevent an older run from replacing a newer run's branch-latest tag.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover-tutorials:
    runs-on: linux-amd64-cpu4
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    outputs:
      build-matrix: ${{ steps.find-tutorials.outputs.build-matrix }}
      publish-matrix: ${{ steps.find-tutorials.outputs.publish-matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find tutorial directories
        id: find-tutorials
        run: |
          set -euo pipefail

          all=$(brev/discover-tutorials.bash)
          # Optionally filter to a subset (fork default: pyhpc only). An empty
          # filter keeps every discovered tutorial.
          filter="${ACH_TUTORIALS_FILTER//,/ }"
          if [ -n "${filter// }" ]; then
            selected=""
            for dir in ${all}; do
              name=$(basename "${dir}")
              for want in ${filter}; do
                if [ "${name}" = "${want}" ]; then selected="${selected}${dir}"$'\n'; fi
              done
            done
          else
            selected="${all}"
          fi

          tutorials=$(printf '%s\n' "${selected}" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          build_entries=$(
            while IFS= read -r tutorial; do
              compose_config=$(docker compose \
                -f "${tutorial}/brev/docker-compose.yml" \
                config --format json)
              architectures=$(jq -c '."x-config".architectures // ["amd64"]' <<< "${compose_config}")
              large=$(jq -r '."x-config".large // false' <<< "${compose_config}")
              if ! jq -e 'type == "array" and length > 0 and length == (unique | length) and all(.[]; . == "amd64" or . == "arm64")' \
                <<< "${architectures}" > /dev/null; then
                echo "${tutorial}: architectures must contain unique amd64/arm64 values" >&2
                exit 1
              fi

              while IFS= read -r architecture; do
                case "${architecture}" in
                  amd64)
                    if [ "${large}" = "true" ]; then
                      runner=linux-amd64-cpu16
                    else
                      runner=linux-amd64-cpu4
                    fi
                    ;;
                  arm64) runner=linux-arm64-cpu16 ;;
                esac
                jq -cn \
                  --arg tutorial "${tutorial}" \
                  --arg architecture "${architecture}" \
                  --arg runner "${runner}" \
                  '{tutorial: $tutorial, architecture: $architecture, runner: $runner}'
              done < <(jq -r '.[]' <<< "${architectures}")
            done < <(jq -r '.[]' <<< "${tutorials}")
          )
          build_matrix=$(jq -sc '{include: .}' <<< "${build_entries}")
          publish_matrix=$(jq -cn --argjson tutorials "${tutorials}" \
            '{include: ($tutorials | map({tutorial: .}))}')

          {
            echo "build-matrix=${build_matrix}"
            echo "publish-matrix=${publish_matrix}"
          } >> "${GITHUB_OUTPUT}"
          echo "Found tutorials: ${tutorials}"
          echo "Build matrix: ${build_matrix}"

  build-and-push:
    needs: discover-tutorials
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix: ${{ fromJson(needs.discover-tutorials.outputs.build-matrix) }}
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set build variables
        run: |
          GIT_BRANCH_NAME=${GITHUB_REF#refs/heads/}
          # Sanitize branch name for Docker tags (replace invalid characters with hyphens and convert to lowercase)
          DOCKER_TAG_BRANCH=$(echo "${GIT_BRANCH_NAME}" | sed 's/[^a-zA-Z0-9._-]/-/g' | tr '[:upper:]' '[:lower:]')
          GIT_SHA=${{ github.sha }}
          GIT_SHORT_SHA=${GIT_SHA::7}
          TUTORIAL_DIR="${{ matrix.tutorial }}"
          TUTORIAL_NAME=$(basename "${TUTORIAL_DIR}")
          ARCHITECTURE="${{ matrix.architecture }}"
          IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/${TUTORIAL_NAME}-tutorial"

          {
            echo "GIT_BRANCH_NAME=${GIT_BRANCH_NAME}"
            echo "DOCKER_TAG_BRANCH=${DOCKER_TAG_BRANCH}"
            echo "GIT_SHA=${GIT_SHA}"
            echo "GIT_SHORT_SHA=${GIT_SHORT_SHA}"
            echo "TUTORIAL_DIR=${TUTORIAL_DIR}"
            echo "TUTORIAL_NAME=${TUTORIAL_NAME}"
            echo "ARCHITECTURE=${ARCHITECTURE}"
            echo "IMAGE_NAME=${IMAGE_NAME,,}"
          } >> "${GITHUB_ENV}"

      - name: Verify native runner architecture
        run: |
          case "${ARCHITECTURE}" in
            amd64) expected=x86_64 ;;
            arm64) expected=aarch64 ;;
            *) echo "Unsupported architecture: ${ARCHITECTURE}" >&2; exit 1 ;;
          esac
          actual=$(uname -m)
          if [ "${actual}" != "${expected}" ]; then
            echo "Expected ${expected} runner for ${ARCHITECTURE}, got ${actual}" >&2
            exit 1
          fi

      - name: Check for HPCCM recipe
        run: |
          if [ -f "${TUTORIAL_DIR}/brev/docker-recipe.py" ]; then
            HAS_HPCCM=true
          else
            HAS_HPCCM=false
          fi
          echo "HAS_HPCCM=${HAS_HPCCM}" >> "${GITHUB_ENV}"

      - name: Set up Python (for HPCCM)
        if: env.HAS_HPCCM == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install HPCCM
        if: env.HAS_HPCCM == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install hpccm

      - name: Generate Dockerfile from HPCCM recipe
        if: env.HAS_HPCCM == 'true'
        run: |
          hpccm --recipe "${TUTORIAL_DIR}/brev/docker-recipe.py" --format docker > "${TUTORIAL_DIR}/brev/dockerfile"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config: /etc/buildkit/buildkitd.toml

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prune Docker build cache (nightly or manual purge)
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.purge_cache)
        run: |
          echo "Purging Docker build cache to rebuild from scratch."
          docker buildx prune --all --force
          docker system prune --all --force

      - name: Build and push Docker image (with retry)
        uses: nick-fields/retry@v3
        env:
          DOCKER_BUILDKIT: 1
          BUILDKIT_PROGRESS: plain
        with:
          timeout_minutes: 60
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            cd "${TUTORIAL_DIR}/brev"

            # Show buildx version and check for cache images
            docker buildx version
            echo "Checking for existing cache images..."
            docker manifest inspect \
              "${IMAGE_NAME}:buildcache-${DOCKER_TAG_BRANCH}-${ARCHITECTURE}" \
              > /dev/null 2>&1 && echo "Branch cache exists" || \
              echo "Branch cache not found"
            docker manifest inspect "${IMAGE_NAME}:buildcache-main-${ARCHITECTURE}" \
              > /dev/null 2>&1 && echo "Main cache exists" || \
              echo "Main cache not found"

            # Nightly scheduled builds and manual purge builds skip cache-from to rebuild from scratch.
            CACHE_FROM_FLAGS=()
            if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name == 'workflow_dispatch' && inputs.purge_cache }}" = "true" ]; then
              echo "Purge build: skipping cache-from to rebuild from scratch."
            else
              CACHE_FROM_FLAGS=(
                --set "base.cache-from=type=registry,ref=${IMAGE_NAME}:buildcache-${DOCKER_TAG_BRANCH}-${ARCHITECTURE}"
                --set "base.cache-from=type=registry,ref=${IMAGE_NAME}:buildcache-main-${ARCHITECTURE}"
              )
              if [ "${ARCHITECTURE}" = "amd64" ]; then
                CACHE_FROM_FLAGS+=(
                  --set "base.cache-from=type=registry,ref=${IMAGE_NAME}:buildcache-${DOCKER_TAG_BRANCH}"
                  --set "base.cache-from=type=registry,ref=${IMAGE_NAME}:buildcache-main"
                )
              fi
            fi

            docker buildx bake \
              --progress=plain \
              --allow=fs.read=* \
              --set "base.output=type=registry" \
              --set "base.tags=${IMAGE_NAME}:${DOCKER_TAG_BRANCH}-git-${GIT_SHORT_SHA}-${ARCHITECTURE}" \
              "${CACHE_FROM_FLAGS[@]}" \
              --set "base.cache-to=type=registry,ref=${IMAGE_NAME}:buildcache-${DOCKER_TAG_BRANCH}-${ARCHITECTURE},mode=max,image-manifest=true,compression=zstd,compression-level=3" \
              --set "base.platform=linux/${ARCHITECTURE}" \
              -f docker-compose.yml \
              base

      - name: Check disk space after build
        if: always()
        run: |
          echo "Disk space after build:"
          df -h /
          echo ""
          echo "Disk usage by directory:"
          du -sh /var/lib/docker/* 2>/dev/null || true
          du -sh /var/lib/buildkit/* 2>/dev/null || true

  publish-and-test:
    needs:
      - discover-tutorials
      - build-and-push
    runs-on: linux-amd64-cpu4
    timeout-minutes: 30
    permissions:
      actions: write
      contents: write
      packages: write
      statuses: write
    strategy:
      matrix: ${{ fromJson(needs.discover-tutorials.outputs.publish-matrix) }}
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set publish variables
        run: |
          GIT_BRANCH_NAME=${GITHUB_REF#refs/heads/}
          DOCKER_TAG_BRANCH=$(echo "${GIT_BRANCH_NAME}" | \
            sed 's/[^a-zA-Z0-9._-]/-/g' | tr '[:upper:]' '[:lower:]')
          GIT_SHA=${{ github.sha }}
          GIT_SHORT_SHA=${GIT_SHA::7}
          TUTORIAL_DIR="${{ matrix.tutorial }}"
          TUTORIAL_NAME=$(basename "${TUTORIAL_DIR}")
          IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/${TUTORIAL_NAME}-tutorial"
          compose_config=$(docker compose \
            -f "${TUTORIAL_DIR}/brev/docker-compose.yml" \
            config --format json)
          ARCHITECTURES=$(jq -r '."x-config".architectures // ["amd64"] | join(" ")' <<< "${compose_config}")

          {
            echo "GIT_BRANCH_NAME=${GIT_BRANCH_NAME}"
            echo "DOCKER_TAG_BRANCH=${DOCKER_TAG_BRANCH}"
            echo "GIT_SHA=${GIT_SHA}"
            echo "GIT_SHORT_SHA=${GIT_SHORT_SHA}"
            echo "TUTORIAL_DIR=${TUTORIAL_DIR}"
            echo "TUTORIAL_NAME=${TUTORIAL_NAME}"
            echo "IMAGE_NAME=${IMAGE_NAME,,}"
            echo "ARCHITECTURES=${ARCHITECTURES}"
          } >> "${GITHUB_ENV}"

      - name: Generate Docker Compose files
        run: |
          python3 brev/generate-tagged-docker-composes.py \
            --image-tag "${DOCKER_TAG_BRANCH}-git-${GIT_SHORT_SHA}" \
            --image-owner "${{ github.repository_owner }}" \
            --output-dir "artifacts/commit-specific" \
            --tutorial "${TUTORIAL_NAME}" \
            --type all

          python3 brev/generate-tagged-docker-composes.py \
            --image-tag "${DOCKER_TAG_BRANCH}-latest" \
            --image-owner "${{ github.repository_owner }}" \
            --output-dir "artifacts/branch-latest" \
            --tutorial "${TUTORIAL_NAME}" \
            --type all

      - name: Upload commit-specific Docker Compose artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-compose-${{ env.TUTORIAL_NAME }}-${{ env.DOCKER_TAG_BRANCH }}-git-${{ env.GIT_SHORT_SHA }}
          path: artifacts/commit-specific/${{ env.TUTORIAL_NAME }}/
          retention-days: 30

      - name: Push branch-latest Docker Compose to generated branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin generated:generated
          git checkout generated
          mkdir -p "${GIT_BRANCH_NAME}/tutorials"
          rm -rf "${GIT_BRANCH_NAME}/tutorials/${TUTORIAL_NAME}"
          cp -r "artifacts/branch-latest/${TUTORIAL_NAME}" "${GIT_BRANCH_NAME}/tutorials/"
          git add "${GIT_BRANCH_NAME}/tutorials/${TUTORIAL_NAME}"

          if git diff --staged --quiet; then
            echo "No changes to commit for ${TUTORIAL_NAME}"
          else
            git commit -m "Update docker-compose for ${GIT_BRANCH_NAME}/${TUTORIAL_NAME}"
            for i in {1..5}; do
              if git push origin generated; then
                echo "Successfully pushed to generated branch"
                break
              fi
              if [ "${i}" -eq 5 ]; then
                echo "Failed to push generated branch after ${i} attempts" >&2
                exit 1
              fi
              echo "Push failed (attempt ${i}/5), pulling and retrying..."
              git pull --rebase origin generated
              sleep 2
            done
          fi

          git checkout "${GITHUB_REF#refs/heads/}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config: /etc/buildkit/buildkitd.toml

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish and verify image manifest
        run: |
          set -euo pipefail

          verify_platforms() {
            local image=$1
            local platforms
            platforms=$(docker manifest inspect --verbose "${image}" | \
              jq -r '(if type == "array" then .[] else . end) | .Descriptor.platform | select(. != null and .os != null and .architecture != null) | select(.os != "unknown" and .architecture != "unknown") | "\(.os)/\(.architecture)"' | \
              sort -u)
            if [ "${platforms}" != "${EXPECTED_PLATFORMS}" ]; then
              echo "Unexpected platforms in ${image}:" >&2
              echo "${platforms}" >&2
              echo "Expected:" >&2
              echo "${EXPECTED_PLATFORMS}" >&2
              exit 1
            fi
          }

          COMMIT_IMAGE="${IMAGE_NAME}:${DOCKER_TAG_BRANCH}-git-${GIT_SHORT_SHA}"
          LATEST_IMAGE="${IMAGE_NAME}:${DOCKER_TAG_BRANCH}-latest"
          SOURCES=()
          EXPECTED_PLATFORMS=""
          for architecture in ${ARCHITECTURES}; do
            SOURCES+=("${COMMIT_IMAGE}-${architecture}")
            EXPECTED_PLATFORMS+="linux/${architecture}"$'\n'
          done
          EXPECTED_PLATFORMS=$(printf '%s' "${EXPECTED_PLATFORMS}" | sort -u)

          TAG_FLAGS=(--tag "${COMMIT_IMAGE}" --tag "${LATEST_IMAGE}")
          if [ "${GIT_BRANCH_NAME}" = "main" ]; then
            TAG_FLAGS+=(--tag "${IMAGE_NAME}:latest")
          fi
          docker buildx imagetools create \
            "${TAG_FLAGS[@]}" \
            "${SOURCES[@]}"

          verify_platforms "${COMMIT_IMAGE}"
          verify_platforms "${LATEST_IMAGE}"
          if [ "${GIT_BRANCH_NAME}" = "main" ]; then
            verify_platforms "${IMAGE_NAME}:latest"
          fi

      - name: Create pending commit status for test
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/statuses/${GIT_SHA}" \
            -f state='pending' \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/workflows/test-brev-tutorial-docker-images.yml" \
            -f description='Test started' \
            -f context="Test Brev Tutorial Docker Images / test-tutorial (tutorials/${TUTORIAL_NAME})"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger test workflow
        run: |
          echo "Triggering test for tutorial: ${TUTORIAL_NAME}"
          gh workflow run test-brev-tutorial-docker-images.yml \
            --ref ${{ github.ref_name }} \
            -f tutorial="${TUTORIAL_NAME}" \
            -f git_sha="${GIT_SHA}" \
            -f workflow_run_id=${{ github.run_id }}
          echo "Test workflow triggered successfully"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
